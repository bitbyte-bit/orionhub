# Render.com deployment configuration
# Documentation: https://render.com/docs/yaml

services:
  # Web application
  - type: web
    name: orionhub
    env: node
    buildCommand: npm ci
    startCommand: npx tsx server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
    autoDeploy: true

  # PostgreSQL Database (uncomment to create managed database)
  # databases:
  #   - name: orionhub
  #     databaseName: orionhub
  #     user: orionhub
  #     plan: free
